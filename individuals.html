        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            margin: 10px 0 20px;
        }

        .back-link {
            color: #4a90e2;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #fff;
        }

        .individual-entry {
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
}

.individual-entry:hover {
    transform: translateY(-3px);
    border-color: #4a90e2;
}


        .search-bar {
            width: 100%;
            max-width: 420px;
            padding: 10px 14px;
            background: #0f0f0f;
            border: 1px solid #222;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .individual-entry {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 18px;
            animation: fadeIn 0.4s forwards;
        }

        .individual-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .individual-header img {
            width: 42px;
            height: 42px;
            border-radius: 6px;
            object-fit: cover;
            background: #222;
        }

        .individual-header h2 {
            margin: 0;
            font-size: 1.4rem;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 14px;
            font-size: 0.85rem;
        }

        td {
            padding: 6px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        td:first-child {
            color: #888;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: bold;
            width: 130px;
        }

        td:last-child {
            color: #4a90e2;
        }

        .description {
            color: #bbb;
            background: #0d0d0d;
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid #333;
            font-size: 0.85rem;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>

const container = document.getElementById("content-area");
const search = document.getElementById("search");

function render(filter = "") {
    container.innerHTML = "";
    for (const [name, data] of Object.entries(individuals)) {
        const identities = (data.stats.Identities || "").toLowerCase();
        if (
            !name.toLowerCase().includes(filter) &&
            !identities.includes(filter)
        ) continue;

       const card = document.createElement("div");
card.className = "individual-entry";

card.innerHTML = `
    <div class="individual-header">
        <img src="${data.icon}">
        <h2>${name}</h2>
    </div>
    <table>
        ${Object.entries(data.stats).map(
            ([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`
        ).join("")}
    </table>
    <div class="description">${data.desc}</div>
`;

if (data.userId) {
    card.addEventListener("click", () => {
        window.open(
            "https://www.roblox.com/users/" + (data.userId || 0) + "/profile",
            "_blank"
        );
    });
}

container.appendChild(card);

    }
}

search.addEventListener("input", e => {
    render(e.target.value.toLowerCase());
});
