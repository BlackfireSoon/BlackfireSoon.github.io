<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Individuals | The Ignation Files</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
        }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; color: #fff; margin: 10px 0; }
        .back-link { color: #4a90e2; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { letter-spacing: 1px; color: #fff; }

        .individual-entry {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        .individual-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .individual-header img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; background: #222; }
        .individual-header h2 { margin: 0; font-size: 1.8rem; color: #fff; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.95rem; }
        td { padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
        td:first-child { color: #888; text-transform: uppercase; font-size: 0.75rem; font-weight: bold; width: 160px; }
        td:last-child { color: #4a90e2; }

        .description { color: #bbb; background: #0d0d0d; padding: 15px; border-radius: 6px; border-left: 3px solid #333; }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="blackfiresoon.github.io" class="back-link">← Return to Archive</a>
        <h1>Individuals</h1>
    </header>

    <div id="content-area"></div>
</div>

<script>
const individuals = {

    "Blackfire": {
        icon: "https://github.com/BlackfireSoon/BlackfireSoon.github.io/blob/main/images/image2.png?raw=true",
        stats: {
            "Identities": "JegErRex, BIackfireDeveIoper, BlackfireSoon, FlipTheRepublics, Colicuss",
            "Roles": "Programmer, Exploiter, Griefer"
        },
        desc: "Founder of Ignation, Noctis, and DICRO. Involved in multiple griefing groups. Created Build Island X, the most successful Build Island exploit, and performed major game-breaking exploits including the Donation Exploit."
    },

    "KizaKaser": {
        icon: "https://github.com/BlackfireSoon/BlackfireSoon.github.io/blob/main/images/image4.png?raw=true",
        stats: {
            "Identities": "KizaKaser, ORCIDLEADER, IFeelBlue",
            "Roles": "Griefer"
        },
        desc: "Founder of ORCID and a notorious Build Island griefer. Former moderator of Bild Iland."
    },

    "Cromerrr": {
        icon: "https://github.com/BlackfireSoon/BlackfireSoon.github.io/blob/main/images/image3.png?raw=true",
        stats: {
            "Identities": "CretorEpics12",
            "Roles": "BIS"
        },
        desc: "Former high-ranking ORCID member and known Build Island griefer. Currently recognized for wiring expertise."
    },

    "TheUserOfTheName": {
        icon: "https://github.com/BlackfireSoon/BlackfireSoon.github.io/blob/main/images/image1.png?raw=true",
        stats: {
            "Identities": "blockdown64",
            "Roles": "Programmer, BIS"
        },
        desc: "Former junior developer of Build Island. Created 'Bild Iland experimentil' after the main game shutdown, attracting most of the original playerbase."
    },

    "Bereza": {
        icon: "https://github.com/BlackfireSoon/BlackfireSoon.github.io/blob/main/images/image5.png?raw=true",
        stats: {
            "Identities": "berezaa",
            "Roles": "Programmer"
        },
        desc: "Founder of Build Island. Actively maintained and protected the community until mid 2021 before stepping back."
    },

    "Aphrodisial": {
        icon: "https://github.com/BlackfireSoon/BlackfireSoon.github.io/blob/main/images/image6.png?raw=true",
        stats: {
            "Identities": "Unknown",
            "Roles": "Programmer"
        },
        desc: "Developer who added the Paint tool and Player Variables system to Build Island."
    },

    "Plexitium": {
        icon: "https://github.com/BlackfireSoon/BlackfireSoon.github.io/blob/main/images/image7.png?raw=true",
        stats: {
            "Identities": "Unknown",
            "Roles": "Programmer"
        },
        desc: "Former junior developer of Build Island. Leaked the Build Island rbxl file and left the community in December 2025, not returning since."
    }
};

const container = document.getElementById("content-area");

for (const [name, data] of Object.entries(individuals)) {
    const card = document.createElement("div");
    card.className = "individual-entry";

    const header = document.createElement("div");
    header.className = "individual-header";
    header.innerHTML = `<img src="${data.icon}" alt="${name}"><h2>${name}</h2>`;
    card.appendChild(header);

    const table = document.createElement("table");
    for (const [key, value] of Object.entries(data.stats)) {
        table.innerHTML += `<tr><td>${key}</td><td>${value}</td></tr>`;
    }
    card.appendChild(table);

    const desc = document.createElement("div");
    desc.className = "description";
    desc.textContent = data.desc;
    card.appendChild(desc);

    container.appendChild(card);
}
</script>

</body>
</html>
