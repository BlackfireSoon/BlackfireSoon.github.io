<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ignation Files</title>
    <style>
        /* Modern Reset & Dark Theme */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            margin: 0;
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: #ffffff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        h2 {
            font-size: 1.2rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 40px;
        }

        /* Navigation Links */
        .nav-links {
            margin: 20px 0;
        }

        .nav-links p {
            margin: 10px 0;
        }

        a {
            color: #4a90e2; /* Sleek Blue */
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease, letter-spacing 0.3s ease;
        }

        a:hover {
            color: #ffffff;
            letter-spacing: 1px;
        }

        /* Image Styling */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 40px auto;
            filter: grayscale(20%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #222;
        }

        /* Contributors Section */
        .contributors {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #222;
            font-size: 0.9rem;
            color: #666;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            color: #bbb;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Ignation Files</h1>

        <h2>Everything you need to know</h2>
        <div class="nav-links">
            <p><a href="groups.html">Groups</a></p>
            <p><a href="http://example.link">Individuals</a></p>
            <p><a href="http://example.link">Lore</a></p>
        </div>

        <img src="https://raw.githubusercontent.com/BlackfireSoon/BlackfireSoon.github.io/refs/heads/main/images/content%20(2).jpg" alt="Content Image">

        <div class="contributors">
            <p>Contributors:</p>
            <ul>
                <li>Blackfire</li>
            </ul>
        </div>
    </div>
</body>
</html>
